<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuji Recipe Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- SVG grain filters -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <filter id="grain-small-weak" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="grain">
        <feFuncR type="linear" slope="0.10" intercept="0.45"/>
        <feFuncG type="linear" slope="0.10" intercept="0.45"/>
        <feFuncB type="linear" slope="0.10" intercept="0.45"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="grain-small-strong" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="grain">
        <feFuncR type="linear" slope="0.20" intercept="0.40"/>
        <feFuncG type="linear" slope="0.20" intercept="0.40"/>
        <feFuncB type="linear" slope="0.20" intercept="0.40"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="grain-large-weak" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.28" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="grain">
        <feFuncR type="linear" slope="0.10" intercept="0.45"/>
        <feFuncG type="linear" slope="0.10" intercept="0.45"/>
        <feFuncB type="linear" slope="0.10" intercept="0.45"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="grain-large-strong" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.28" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="grain">
        <feFuncR type="linear" slope="0.17" intercept="0.415"/>
        <feFuncG type="linear" slope="0.17" intercept="0.415"/>
        <feFuncB type="linear" slope="0.17" intercept="0.415"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </svg>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-brand">FUJI</span><span class="logo-title">Recipe Helper</span>
      </div>
      <nav class="header-nav" aria-label="App navigation">
        <button class="btn btn-ghost" id="btn-sensor" aria-haspopup="dialog">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
          <span id="sensor-label">X-Trans V</span>
          <svg width="10" height="6" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button class="btn btn-ghost" id="btn-my-recipes">My Recipes</button>
      </nav>
    </div>
  </header>

  <main class="app-layout">

    <!-- ── LEFT: Film Simulation ── -->
    <aside class="panel panel-film" aria-label="Film simulation">
      <div class="panel-header">
        <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="2.5"/>
          <rect x="7" y="2" width="3" height="4" rx="1"/>
          <rect x="14" y="2" width="3" height="4" rx="1"/>
          <rect x="7" y="18" width="3" height="4" rx="1"/>
          <rect x="14" y="18" width="3" height="4" rx="1"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="12" cy="12" r="1.5"/>
        </svg>
        <h2 class="panel-title">Film Simulation</h2>
      </div>
      <div class="film-sim-grid" id="film-sim-grid" role="radiogroup" aria-label="Choose a film simulation"></div>
    </aside>

    <!-- ── CENTER: Preview ── -->
    <section class="panel panel-preview" aria-label="Recipe preview">

      <div class="photo-picker" id="photo-picker" role="group" aria-label="Choose a test photo">
        <button class="photo-type-btn is-active" data-photo="landscape">Landscape</button>
        <button class="photo-type-btn" data-photo="architecture">Architecture</button>
        <button class="photo-type-btn" data-photo="color">Color</button>
        <button class="photo-type-btn photo-type-btn--upload" data-photo="custom" id="btn-custom-photo">Custom</button>
        <input type="file" id="custom-photo-input" accept="image/*" aria-label="Upload a custom photo" style="display:none">
      </div>

      <div class="filmstrip-frame">
        <figure class="photo-figure" id="photo-figure">
          <img class="photo-img photo-after" id="photo-after" src="" alt="Photo with recipe applied">
          <div class="custom-upload-prompt" id="custom-upload-prompt" hidden>
            <button class="custom-upload-btn" id="btn-trigger-upload" aria-label="Upload a photo">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span>Upload Image</span>
            </button>
          </div>
          <div class="comparison-overlay" id="comparison-overlay" hidden aria-hidden="true">
            <img class="photo-img photo-before" id="photo-before" src="" alt="Original photo">
            <div class="divider-handle" id="divider-handle" role="slider"
                 aria-label="Before/after comparison" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50">
              <div class="divider-line"></div>
              <div class="divider-grip"></div>
            </div>
          </div>
        </figure>
      </div>

      <div class="preview-footer">
        <label class="comparison-toggle">
          <input type="checkbox" id="toggle-comparison" role="switch">
          <span class="toggle-track"></span>
          <span class="toggle-text">Show original</span>
        </label>
        <label class="comparison-toggle">
          <input type="checkbox" id="toggle-magnifier" role="switch">
          <span class="toggle-track"></span>
          <span class="toggle-text">Magnifier</span>
        </label>
        <button class="btn btn-ghost btn-reupload" id="btn-reupload" hidden>Upload ↑</button>
        <p class="disclaimer">Approximate preview — results vary by camera</p>
      </div>

      <div class="recipe-save">
        <input class="recipe-name-input" id="recipe-name" type="text"
               placeholder="Recipe name…" aria-label="Recipe name" maxlength="64">
        <div class="recipe-actions">
          <button class="btn btn-primary" id="btn-save">Save Recipe</button>
          <button class="btn btn-ghost" id="btn-reset">Reset</button>
        </div>
        <button class="btn btn-export" id="btn-export-card" aria-label="Export recipe as image">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export Card
        </button>
      </div>

    </section>

    <!-- ── RIGHT: Parameters ── -->
    <aside class="panel panel-params" aria-label="Recipe parameters">
      <div class="panel-header">
        <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/>
          <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
        </svg>
        <h2 class="panel-title">Parameters</h2>
      </div>
      <div class="parameter-list" id="parameter-list"></div>
    </aside>

  </main>

  <!-- Dark/light mode FAB (desktop only) -->
  <button class="theme-fab" id="btn-theme" aria-label="Toggle light/dark mode">
    <!-- Moon icon (shown in light mode) -->
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <!-- Sun icon (shown in dark mode) -->
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <!-- Mobile bottom nav bar -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <button class="mobile-nav-btn" id="mob-btn-film" aria-label="Open film simulation" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="2.5"/>
        <rect x="7" y="2" width="3" height="4" rx="1"/>
        <rect x="14" y="2" width="3" height="4" rx="1"/>
        <rect x="7" y="18" width="3" height="4" rx="1"/>
        <rect x="14" y="18" width="3" height="4" rx="1"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="12" cy="12" r="1.5"/>
      </svg>
      <span>Film Sim</span>
    </button>
    <button class="mobile-nav-btn" id="mob-btn-params" aria-label="Open parameters" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/>
        <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
      </svg>
      <span>Adjust</span>
    </button>
    <button class="mobile-nav-btn" id="mob-btn-recipe" aria-label="Open recipe panel" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      <span>Recipe</span>
    </button>
  </nav>

  <!-- Bottom sheet backdrop -->
  <div class="sheet-backdrop" id="sheet-backdrop" hidden aria-hidden="true"></div>

  <!-- Film Sim bottom sheet -->
  <div class="bottom-sheet" id="sheet-film" role="dialog" aria-modal="true" aria-label="Film simulation" hidden>
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="2.5"/>
        <rect x="7" y="2" width="3" height="4" rx="1"/>
        <rect x="14" y="2" width="3" height="4" rx="1"/>
        <rect x="7" y="18" width="3" height="4" rx="1"/>
        <rect x="14" y="18" width="3" height="4" rx="1"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="12" cy="12" r="1.5"/>
      </svg>
      <h2 class="sheet-title">Film Simulation</h2>
      <button class="sheet-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="film-sim-grid" id="film-sim-grid-mobile" role="radiogroup" aria-label="Choose a film simulation"></div>
    </div>
  </div>

  <!-- Parameters bottom sheet -->
  <div class="bottom-sheet" id="sheet-params" role="dialog" aria-modal="true" aria-label="Recipe parameters" hidden>
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/>
        <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
      </svg>
      <h2 class="sheet-title">Parameters</h2>
      <button class="sheet-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="parameter-list" id="parameter-list-mobile"></div>
    </div>
  </div>

  <!-- Recipe bottom sheet -->
  <div class="bottom-sheet" id="sheet-recipe" role="dialog" aria-modal="true" aria-label="Save recipe" hidden>
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      <h2 class="sheet-title">Save Recipe</h2>
      <button class="sheet-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="recipe-save recipe-save--mobile">
        <input class="recipe-name-input" id="recipe-name-mobile" type="text"
               placeholder="Recipe name…" aria-label="Recipe name" maxlength="64">
        <div class="recipe-actions">
          <button class="btn btn-primary" id="btn-save-mobile">Save Recipe</button>
          <button class="btn btn-ghost" id="btn-reset-mobile">Reset</button>
        </div>
        <button class="btn btn-export" id="btn-export-card-mobile" aria-label="Export recipe as image">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export Card
        </button>
      </div>
    </div>
  </div>

  <!-- Sensor selector modal -->
  <div class="modal-overlay" id="sensor-modal" role="dialog" aria-modal="true"
       aria-labelledby="sensor-modal-title" hidden>
    <div class="modal">
      <h2 class="modal-title" id="sensor-modal-title">Choose Your Camera</h2>
      <p class="modal-subtitle">Select your X-Trans generation to see supported film simulations and parameters.</p>
      <div class="sensor-list" id="sensor-list"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
